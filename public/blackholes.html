<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTAIR - Black Holes Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #ff0055;
            --bg-dark: #050505;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        .font-display { font-family: 'Syncopate', sans-serif; }
        .font-arcade { font-family: 'VT323', monospace; }
        
        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                  "void-black": "#05070A",
                  "neon-cyan": "#00F0FF",
                  "surface-container-high": "#282a2e",
                  "hazard-orange": "#FF8A00",
                  "outline-variant": "#3b494b"
              },
              fontFamily: {
                  "label-caps": ["jetbrainsMono"]
              }
            }
          }
        }
    </script>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-10 h-20 bg-void-black/80 backdrop-blur-md border-b border-outline-variant/30 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 flex items-center justify-center neon-glow">
                <img alt="ALTAIR Logo" class="w-full h-full object-cover mix-blend-screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7l_shqM87xJTobUlAICGaKuFvdZLTlX1zCtxtb3lakYkVrZIpEibM6kkXx6NCq_KfNVBh6lwzYqhB-00cwDee8LSo3Hv9txqv-P1IySKAdQ4E9YxCnMN3HLvVnY9IqaXafjH74eOiX-iVhFo4p3Gk-RJHy_otUPUizAbhqH6ylW25-8VoeUe2DH1XnnJVLc5g3g0FFgxTpqDO80RVQUOCpmtwFt5UjusWubjk1yhd5pLSbenMTGahEEtJ7xRcdx9owceM_2-WTBmC">
            </div>
            <span class="font-arcade text-4xl font-extrabold text-neon-cyan tracking-tighter neon-glow">ALTAIR</span>
        </div>
        <nav class="hidden md:flex items-center gap-8">
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="/home.html">HOME</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="#">RADAR</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="/sky.html">SKY VIEW</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="/game.html">GAMES</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-neon-cyan border-b-2 border-neon-cyan pb-1 transition-all duration-300" href="/knowledge.html">KNOWLEDGE HUB</a>
        </nav>
        <div class="flex items-center gap-6">
            <button class="material-symbols-outlined text-gray-400 hover:text-neon-cyan transition-all active:scale-95">notifications</button>
            <a href="/profile.html" class="flex items-center gap-3 bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant/30 hover:bg-surface-variant transition-colors cursor-pointer">
                <span id="user-profile-name" class="font-label-caps font-bold tracking-[0.15em] text-[10px] text-neon-cyan"></span>
                <button class="material-symbols-outlined text-neon-cyan" style="font-variation-settings: 'FILL' 1;">account_circle</button>
            </a>
            <button id="logout-btn" class="font-label-caps font-bold tracking-[0.15em] text-[10px] text-hazard-orange hover:text-white transition-colors border border-hazard-orange/30 px-3 py-1 rounded">LOGOUT</button>
        </div>
    </header>

    <main class="flex-1 mt-20 flex flex-col items-center pt-12 pb-24 px-8 relative z-10 overflow-y-auto">
        <a href="/knowledge.html" class="absolute top-8 left-8 flex items-center gap-2 text-zinc-400 hover:text-white transition-colors z-50 font-mono text-xs tracking-widest uppercase cursor-pointer">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Return to Hub
        </a>

        <h1 class="font-display text-4xl tracking-[0.3em] mb-16 text-white text-center">BLACK HOLE <br><span class="text-[var(--primary)] text-xl">ANOMALIES</span></h1>
        
        <div class="flex flex-wrap justify-center gap-8 max-w-7xl" id="grid">
            <!-- Thumbnails Injected via JS -->
            <div class="text-center w-full text-zinc-500 font-arcade text-2xl tracking-widest animate-pulse" id="loading">DECRYPTING ARCHIVES...</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Auth Logic
            const username = localStorage.getItem('altair_username');
            if (username) {
                const profileName = document.getElementById('user-profile-name');
                if (profileName) {
                    profileName.textContent = username.toUpperCase();
                }
            }
            
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('altair_token');
                    localStorage.removeItem('altair_username');
                    window.location.href = '/landing.html';
                });
            }

            // Fetch and render data
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch('/data/knowledge.json');
                const data = await response.json();
                
                const blackholes = data.filter(item => item.type === 'blackhole');
                
                loading.style.display = 'none';

                blackholes.forEach(p => {
                    const card = document.createElement('a');
                    card.href = `/celestial-detail.html?id=${p.id}`;
                    card.className = 'flex flex-col items-center gap-4 cursor-pointer group transition-transform hover:-translate-y-2';
                    
                    const imageUrl = p.image || 'https://via.placeholder.com/300x300?text=No+Image';
                    
                    card.innerHTML = `
                        <div class="w-48 h-48 rounded-full overflow-hidden border border-white/10 group-hover:border-[var(--primary)] transition-colors shadow-[0_0_15px_rgba(0,0,0,0.5)] group-hover:shadow-[0_0_25px_rgba(255,0,85,0.6)]">
                            <div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style="background-image: url('${imageUrl}')"></div>
                        </div>
                        <span class="font-arcade text-xl tracking-widest text-zinc-400 group-hover:text-white transition-colors max-w-[200px] text-center">${p.name}</span>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.textContent = 'ERROR: UNABLE TO DECRYPT ARCHIVES';
                loading.classList.remove('animate-pulse');
                loading.classList.add('text-hazard-orange');
                console.error(err);
            }
        });
    </script>
</body>
</html>
