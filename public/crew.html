<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTAIR - ISS Crew Manifest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #00F0FF;
            --bg-dark: #050505;
        }
        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0));
            background-size: 200px 200px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .font-display { font-family: 'Syncopate', sans-serif; }
        .font-arcade { font-family: 'VT323', monospace; }
        .panel-border {
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1) inset;
        }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-10 h-20 bg-[#05070A]/80 backdrop-blur-md border-b border-[#3b494b]/30 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 flex items-center justify-center" style="text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);">
            <img alt="ALTAIR Logo" class="w-full h-full object-cover mix-blend-screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7l_shqM87xJTobUlAICGaKuFvdZLTlX1zCtxtb3lakYkVrZIpEibM6kkXx6NCq_KfNVBh6lwzYqhB-00cwDee8LSo3Hv9txqv-P1IySKAdQ4E9YxCnMN3HLvVnY9IqaXafjH74eOiX-iVhFo4p3Gk-RJHy_otUPUizAbhqH6ylW25-8VoeUe2DH1XnnJVLc5g3g0FFgxTpqDO80RVQUOCpmtwFt5UjusWubjk1yhd5pLSbenMTGahEEtJ7xRcdx9owceM_2-WTBmC">
        </div>
        <span class="text-4xl font-extrabold text-[#00F0FF] tracking-tighter" style="font-family: 'VT323', monospace; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);">ALTAIR</span>
    </div>
    <nav class="hidden md:flex items-center gap-8" style="font-family: 'JetBrains Mono', monospace;">
        <a class="text-[12px] tracking-[0.15em] font-bold text-[#b9cacb] hover:text-[#00F0FF] transition-colors" href="/home.html">HOME</a>
        <a class="text-[12px] tracking-[0.15em] font-bold text-[#00F0FF] border-b-2 border-[#00F0FF] pb-1 transition-all duration-300" href="/iss.html">ISS TRACKER</a>
        <a class="text-[12px] tracking-[0.15em] font-bold text-[#b9cacb] hover:text-[#00F0FF] transition-colors" href="/sky.html">SKY VIEW</a>
        <a class="text-[12px] tracking-[0.15em] font-bold text-[#b9cacb] hover:text-[#00F0FF] transition-colors" href="/game.html">GAMES</a>
        <a class="text-[12px] tracking-[0.15em] font-bold text-[#b9cacb] hover:text-[#00F0FF] transition-colors" href="/knowledge.html">KNOWLEDGE HUB</a>
    </nav>
    <div class="flex items-center gap-6" style="font-family: 'JetBrains Mono', monospace;">
        <button class="material-symbols-outlined text-[#b9cacb] hover:text-[#00F0FF] transition-all active:scale-95">notifications</button>
        <a href="/profile.html" class="flex items-center gap-3 bg-[#282a2e] px-3 py-1 rounded-full border border-[#3b494b]/30 hover:bg-[#323539] transition-colors cursor-pointer">
            <span id="user-profile-name" class="font-bold tracking-[0.15em] text-[10px] text-[#00F0FF]"></span>
            <button class="material-symbols-outlined text-[#00F0FF]" style="font-variation-settings: 'FILL' 1;">account_circle</button>
        </a>
        <button id="logout-btn" class="font-bold tracking-[0.15em] text-[10px] text-[#FF8A00] hover:text-white transition-colors border border-[#FF8A00]/30 px-3 py-1 rounded">LOGOUT</button>
    </div>
</header>

    <main class="flex-1 mt-20 p-8 max-w-7xl mx-auto w-full z-10 overflow-y-auto pb-32">
        <div class="flex items-center gap-4 mb-8">
            <a href="/iss.html" class="material-symbols-outlined text-3xl text-[#00F0FF] hover:scale-110 transition-transform cursor-pointer" style="text-shadow: 0 0 10px #00F0FF;">arrow_back</a>
            <div>
                <h1 class="text-4xl md:text-5xl font-display font-black text-white tracking-tighter uppercase italic">ISS Crew Manifest</h1>
                <p class="text-[#00F0FF] font-arcade tracking-[0.2em] text-xl mt-2" id="crew-count-header">Loading data...</p>
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <span class="material-symbols-outlined text-6xl text-[#00F0FF] animate-spin">sync</span>
            <p class="mt-4 font-mono text-zinc-400 animate-pulse">ESTABLISHING UPLINK TO ISS...</p>
        </div>

        <div id="crew-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Crew cards injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 px-10 flex flex-col md:flex-row justify-between items-center opacity-60 bg-[#05070A] border-t border-[#FF8A00]/20 mt-auto z-50 relative">
<div class="flex flex-col items-center md:items-start mb-6 md:mb-0">
<span class="arcade-font text-4xl text-[#00F0FF] mb-2" style="font-family: 'VT323', monospace;">ALTAIR</span>
<p class="font-label-caps text-[10px] text-[#b9cacb]" style="font-family: 'JetBrains Mono', monospace;">© 2024 ALTAIR GALACTIC COMMAND. ALL RIGHTS RESERVED.</p>
</div>
<div class="flex gap-8 font-label-caps text-[12px] text-[#b9cacb]" style="font-family: 'JetBrains Mono', monospace;">
<a class="hover:text-[#FF8A00] transition-colors cursor-pointer" onclick="if(navigator.share){navigator.share({title:'ALTAIR', url: window.location.href})} else {navigator.clipboard.writeText(window.location.href); alert('Link copied to clipboard!')}; return false;">SHARE</a>
<a class="hover:text-[#FF8A00] transition-colors cursor-pointer" onclick="alert('ALTAIR Galactic Command\nVersion: 1.0.0\nBuilt for deep space simulation and training.'); return false;">ABOUT</a>
</div>
</footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('altair_username');
            if (username && document.getElementById('user-profile-name')) {
                document.getElementById('user-profile-name').textContent = username.toUpperCase();
            }
            if (document.getElementById('logout-btn')) {
                document.getElementById('logout-btn').addEventListener('click', () => {
                    localStorage.removeItem('altair_token');
                    localStorage.removeItem('altair_username');
                    window.location.href = '/landing.html';
                });
            }
        });

        async function fetchCrewDetails() {
            try {
                const res = await fetch('http://api.open-notify.org/astros.json');
                const data = await res.json();
                
                const issCrew = data.people.filter(p => p.craft === 'ISS');
                document.getElementById('crew-count-header').textContent = `TOTAL PERSONNEL ONBOARD: ${issCrew.length}`;
                
                const grid = document.getElementById('crew-grid');
                grid.innerHTML = '';

                // Fetch details from Wikipedia for each
                for(const person of issCrew) {
                    const card = document.createElement('div');
                    card.className = 'panel-border rounded-xl p-6 flex flex-col gap-4 hover:border-[#00F0FF] transition-colors group cursor-pointer';
                    
                    // Default layout while loading wiki
                    card.innerHTML = `
                        <div class="flex items-center gap-4 border-b border-white/10 pb-4">
                            <div class="w-16 h-16 rounded-full bg-zinc-800 border-2 border-[#00F0FF] flex items-center justify-center overflow-hidden" id="img-${person.name.replace(/\s+/g, '')}">
                                <span class="material-symbols-outlined text-3xl text-zinc-500">person</span>
                            </div>
                            <div>
                                <h2 class="text-xl font-bold text-white font-display uppercase truncate w-full" title="${person.name}">${person.name}</h2>
                                <span class="px-2 py-1 bg-[#00F0FF]/10 text-[#00F0FF] text-[10px] font-arcade tracking-widest mt-1 inline-block border border-[#00F0FF]/30">ACTIVE // ${person.craft}</span>
                            </div>
                        </div>
                        <div class="text-xs text-zinc-400 font-mono leading-relaxed flex-1 h-32 overflow-y-auto" id="desc-${person.name.replace(/\s+/g, '')}">
                            Retrieving personnel dossier...
                        </div>
                    `;
                    grid.appendChild(card);

                    // Fetch Wikipedia summary
                    fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(person.name)}`)
                        .then(res => res.json())
                        .then(wiki => {
                            if(wiki.extract) {
                                document.getElementById(`desc-${person.name.replace(/\s+/g, '')}`).textContent = wiki.extract;
                            } else {
                                document.getElementById(`desc-${person.name.replace(/\s+/g, '')}`).textContent = "Dossier classified or unavailable in database.";
                            }

                            if(wiki.thumbnail && wiki.thumbnail.source) {
                                document.getElementById(`img-${person.name.replace(/\s+/g, '')}`).innerHTML = `<img src="${wiki.thumbnail.source}" alt="${person.name}" class="w-full h-full object-cover">`;
                            }
                        })
                        .catch(err => {
                            document.getElementById(`desc-${person.name.replace(/\s+/g, '')}`).textContent = "Dossier unavailable (Connection Error).";
                        });
                }

                document.getElementById('loading').classList.add('hidden');
                grid.classList.remove('hidden');

            } catch(e) {
                console.error("Failed to fetch crew:", e);
                document.getElementById('loading').innerHTML = '<span class="material-symbols-outlined text-6xl text-red-500">error</span><p class="mt-4 font-mono text-red-500">UPLINK FAILED. UNABLE TO RETRIEVE MANIFEST.</p>';
            }
        }

        fetchCrewDetails();
    </script>
</body>
</html>
