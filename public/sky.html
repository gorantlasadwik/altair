<!DOCTYPE html><html class="dark" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ALTAIR | Sky View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&amp;family=JetBrains+Mono:wght@500;700&amp;family=Hanken+Grotesk:wght@400;600&amp;family=VT323&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        body {
            background-color: #05070A;
            color: #e1e2e7;
            overflow-x: hidden;
        }

        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.15;
        }

        .hud-corner {
            position: fixed;
            width: 40px;
            height: 40px;
            border-color: #3b494b;
            z-index: 60;
            pointer-events: none;
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        .arcade-font {
            font-family: 'VT323', monospace;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "void-black": "#05070A",
                      "neon-cyan": "#00F0FF",
                      "cyber-purple": "#BC00FF",
                      "electric-blue": "#0070FF",
                      "hazard-orange": "#FF8A00",
                      "on-surface": "#e1e2e7",
                      "on-surface-variant": "#b9cacb",
                      "surface-container-high": "#282a2e",
                      "outline-variant": "#3b494b"
              },
              "fontFamily": {
                      "body-md": ["hankenGrotesk"],
                      "label-caps": ["jetbrainsMono"]
              }
            }
          }
        }
      </script>
      <script>
        if (!localStorage.getItem('altair_token')) {
            window.location.href = '/landing.html';
        }
      </script>
</head>
<body class="bg-void-black font-body-md text-on-surface">
<div class="scanline-overlay"></div>
<div class="hud-corner top-0 left-0 border-t-2 border-l-2 m-4 opacity-50"></div>
<div class="hud-corner top-0 right-0 border-t-2 border-r-2 m-4 opacity-50"></div>
<div class="hud-corner bottom-0 left-0 border-b-2 border-l-2 m-4 opacity-50"></div>
<div class="hud-corner bottom-0 right-0 border-b-2 border-r-2 m-4 opacity-50"></div>
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-10 h-20 bg-void-black/80 backdrop-blur-md border-b border-outline-variant/30 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
<div class="flex items-center gap-4">
<span class="arcade-font text-4xl font-extrabold text-neon-cyan tracking-tighter neon-glow">ALTAIR</span>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="font-label-caps text-[12px] text-on-surface-variant hover:text-neon-cyan transition-colors" href="/home.html">HOME</a>
<a class="font-label-caps text-[12px] text-on-surface-variant hover:text-neon-cyan transition-colors" href="#">RADAR</a>
<a class="font-label-caps text-[12px] text-neon-cyan border-b-2 border-neon-cyan pb-1 transition-all duration-300" href="/sky.html">SKY VIEW</a>
<a class="font-label-caps text-[12px] text-on-surface-variant hover:text-neon-cyan transition-colors" href="/game.html">GAMES</a>
<a class="font-label-caps text-[12px] text-on-surface-variant hover:text-neon-cyan transition-colors" href="#">KNOWLEDGE HUB</a>
</nav>
<div class="flex items-center gap-6">
<div class="flex items-center gap-3 bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant/30">
<span id="user-profile-name" class="font-label-caps text-[10px] text-neon-cyan">COMMANDER</span>
<button class="material-symbols-outlined text-neon-cyan" style="font-variation-settings: 'FILL' 1;">account_circle</button>
</div>
<button id="logout-btn" class="font-label-caps text-[10px] text-hazard-orange hover:text-white transition-colors border border-hazard-orange/30 px-3 py-1 rounded">LOGOUT</button>
</div>
</header>

<main class="mt-20 h-[calc(100vh-5rem)] w-full relative bg-black">
    <iframe src="https://stellarium-web.org/" class="w-full h-full border-none" allowfullscreen title="Stellarium Web Engine"></iframe>
</main>

<script>
    // Profile logic
    const username = localStorage.getItem('altair_username');
    if (username) {
        document.getElementById('user-profile-name').textContent = username.toUpperCase();
    }
    document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.removeItem('altair_token');
        window.location.href = '/landing.html';
    });
</script>
</body>
</html>
