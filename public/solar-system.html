    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #9d00ff;
            --accent: #ff0055;
            --hazard: #ff3300;
            --bg-dark: #050505;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Starry background */
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        .font-display { font-family: 'Syncopate', sans-serif; }
        .font-arcade { font-family: 'VT323', monospace; }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(0,245,255,0.7), 0 0 20px rgba(0,245,255,0.5);
        }

        /* Planet UI Styles */
        .hud-line {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .planet-sphere {
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            /* Extremely realistic lighting shadow from left to right */
            box-shadow: 
                inset 500px 0 300px -50px rgba(0,0,0,1), 
                inset 200px 0 150px rgba(0,0,0,0.8),
                inset -20px 0 50px rgba(255,255,255,0.1);
            position: relative;
        }

        /* Central Crosshair */
        .crosshair-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .crosshair-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .crosshair-circle::before, .crosshair-circle::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.3);
        }
        
        .crosshair-circle::before {
            top: -10px; bottom: -10px; left: 50%; width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.3) 90%, transparent);
        }

        .crosshair-circle::after {
            left: -10px; right: -10px; top: 50%; height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.3) 90%, transparent);
        }

        /* Small precise ticks on crosshair */
        .tick {
            position: absolute;
            background: rgba(255,255,255,0.6);
        }
        .tick.top { top: 0; left: 50%; width: 2px; height: 6px; transform: translateX(-50%); }
        .tick.bottom { bottom: 0; left: 50%; width: 2px; height: 6px; transform: translateX(-50%); }
        .tick.left { left: 0; top: 50%; width: 6px; height: 2px; transform: translateY(-50%); }
        .tick.right { right: 0; top: 50%; width: 6px; height: 2px; transform: translateY(-50%); }
        
        /* 45 degree ticks */
        .tick.d1 { top: 14.6%; left: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, -50%); }
        .tick.d2 { top: 14.6%; right: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(50%, -50%); }
        .tick.d3 { bottom: 14.6%; left: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, 50%); }
        .tick.d4 { bottom: 14.6%; right: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(50%, 50%); }

        .crosshair-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: white;
            z-index: 10;
        }

        .data-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.05em;
        }
        
        .composition-box {
            position: absolute;
            font-size: 8px;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
        }
        
        .composition-line {
            position: absolute;
            height: 1px;
            background: rgba(255,255,255,0.4);
            transform-origin: left center;
        }

        .dot {
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        .arcade-font {
            font-family: 'VT323', monospace;
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        .arcade-font {
            font-family: 'VT323', monospace;
        }
    </style>

            },
            {
                id: 'saturn', name: 'SATURN',
                image: 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg',
                orbitDistance: '1 434 000 000 KM', axialTilt: '26.73°', orbitalPeriod: '10759 DAYS',
                lengthOfDay: '10.7 HOURS', diameter: '116 460 KM', mass: '5.683*10^26 KG',
                surfaceTemp: '-140°C',
                funFact: 'Saturn has the most extensive ring system of any planet, made almost entirely of water ice particles.',
                description: 'The sixth planet from the Sun and the second-largest in the Solar System. It is a gas giant with an average radius of about nine and a half times that of Earth.',
                composition: [
                    { label: 'H2', value: '96.3%' }, { label: 'He', value: '3.25%' }
                ]
            },
            {
                id: 'uranus', name: 'URANUS',
                image: 'https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg',
                orbitDistance: '2 871 000 000 KM', axialTilt: '97.77°', orbitalPeriod: '30688 DAYS',
                lengthOfDay: '17.2 HOURS', diameter: '50 724 KM', mass: '8.681*10^25 KG',
                surfaceTemp: '-195°C',
                funFact: 'Uranus rotates on its side, meaning its axis of spin is nearly parallel to its orbital plane.',
                description: 'The seventh planet from the Sun. It has the third-largest planetary radius and fourth-largest planetary mass in the Solar System. Often classified as an "ice giant".',
                composition: [
                    { label: 'H2', value: '83%' }, { label: 'He', value: '15%' }
                ]
            },
            {
                id: 'neptune', name: 'NEPTUNE',
                image: 'https://upload.wikimedia.org/wikipedia/commons/6/63/Neptune_-_Voyager_2_%2829741875326%29.png',
                orbitDistance: '4 495 000 000 KM', axialTilt: '28.32°', orbitalPeriod: '60182 DAYS',
                lengthOfDay: '16.1 HOURS', diameter: '49 244 KM', mass: '1.024*10^26 KG',
                surfaceTemp: '-200°C',
                funFact: 'Neptune has the strongest winds in the solar system, which can reach supersonic speeds of 2,100 km/h.',
                description: 'The eighth and farthest-known Solar planet from the Sun. In the Solar System, it is the fourth-largest planet by diameter, the third-most-massive planet, and the densest giant planet.',
                composition: [
                    { label: 'H2', value: '80%' }, { label: 'He', value: '19%' }
                ]
            }
        ];

        const overviewState = document.getElementById('overview-state');
        const detailState = document.getElementById('detail-state');
        const planetGrid = document.getElementById('planet-grid');

        // Populate Overview Grid
        planets.forEach(p => {
            const card = document.createElement('div');
            card.className = 'flex flex-col items-center gap-4 cursor-pointer group';
            card.onclick = () => showDetail(p.id);
            
            card.innerHTML = `
                <div class="w-32 h-32 rounded-full overflow-hidden border border-white/10 group-hover:border-primary transition-colors shadow-[0_0_15px_rgba(0,0,0,0.5)]">
                    <div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style="background-image: url('${p.image}')"></div>
                </div>
                <span class="font-arcade text-xl tracking-widest text-zinc-400 group-hover:text-white transition-colors">${p.name}</span>
            `;
            planetGrid.appendChild(card);
        });

        function showDetail(planetId) {
            const data = planets.find(p => p.id === planetId);
            if (!data) return;

            // Populate HUD
            document.getElementById('hud-title').textContent = data.name;
            document.getElementById('hud-planet').style.backgroundImage = `url('${data.image}')`;
            
            document.getElementById('hud-orbit-dist').textContent = data.orbitDistance;
            document.getElementById('hud-axial-tilt').textContent = data.axialTilt;
            document.getElementById('hud-orbital-period').textContent = data.orbitalPeriod;
            document.getElementById('hud-length-day').textContent = data.lengthOfDay;
            document.getElementById('hud-diameter').textContent = data.diameter;
            document.getElementById('hud-mass').textContent = data.mass;
            document.getElementById('hud-surface-temp').textContent = data.surfaceTemp;
            
            const descEl = document.getElementById('hud-description');
            if(descEl) descEl.textContent = data.description;
            const factEl = document.getElementById('hud-fun-fact');
            if(factEl) factEl.textContent = data.funFact;
            
            document.getElementById('hud-description').textContent = data.description;
            document.getElementById('hud-fun-fact').textContent = data.funFact;

            // Build composition callouts
            const compContainer = document.getElementById('hud-composition');
            compContainer.innerHTML = '';
            
            if(data.composition && data.composition.length > 0) {
                // To match screenshots, line goes right
                const compHtml = `
                    <div class="composition-line" style="top: 25%; left: 85%; width: 60px;"></div>
                    <div class="dot" style="top: 25%; left: 85%; transform: translate(-50%, -50%);"></div>
                    <div class="dot" style="top: 25%; left: calc(85% + 60px); transform: translate(-50%, -50%);"></div>
                    <div class="composition-box" style="top: 25%; left: calc(85% + 70px); transform: translateY(-30%);">
                        ${data.composition.map(c => {
                            if (c.isTitle) return `<div class="mt-2 mb-1 text-white opacity-90">${c.label}</div>`;
                            return `<div>${c.label} = ${c.value}</div>`;
                        }).join('')}
                    </div>
                `;
                compContainer.innerHTML = compHtml;
            }

            // Transition
            overviewState.classList.add('opacity-0');
            setTimeout(() => {
                overviewState.classList.add('hidden');
                detailState.classList.remove('hidden');
                // reflow
                void detailState.offsetWidth;
                detailState.scrollTop = 0;
                detailState.classList.remove('opacity-0');
            }, 500);
        }

        function showOverview() {
            detailState.classList.remove('opacity-100');
            detailState.classList.add('opacity-0');
            
            setTimeout(() => {
                detailState.classList.add('hidden');
                overviewState.classList.remove('hidden');
                
                // Small delay to ensure display:block applies before opacity transition
                requestAnimationFrame(() => {
                    overviewState.classList.remove('opacity-0');
                    overviewState.classList.add('opacity-100');
                });
            }, 500); // Wait for fade out
        }

        // Auth Logic
        const username = localStorage.getItem('altair_username');
        if (username) {
            const profileName = document.getElementById('user-profile-name');
            if (profileName) {
                profileName.textContent = username.toUpperCase();
            }
        }
        
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('altair_token');
                localStorage.removeItem('altair_username');
                window.location.href = '/landing.html';
            });
        }
    </script>
</body>
</html>
