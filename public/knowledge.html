<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTAIR - Knowledge Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #9d00ff;
            --bg-dark: #050505;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        .font-display { font-family: 'Syncopate', sans-serif; }
        .font-arcade { font-family: 'VT323', monospace; }
        
        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                  "void-black": "#05070A",
                  "neon-cyan": "#00F0FF",
                  "surface-container-high": "#282a2e",
                  "hazard-orange": "#FF8A00",
                  "outline-variant": "#3b494b"
              },
              fontFamily: {
                  "label-caps": ["jetbrainsMono"]
              }
            }
          }
        }
    </script>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-10 h-20 bg-void-black/80 backdrop-blur-md border-b border-outline-variant/30 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 flex items-center justify-center neon-glow">
                <img alt="ALTAIR Logo" class="w-full h-full object-cover mix-blend-screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7l_shqM87xJTobUlAICGaKuFvdZLTlX1zCtxtb3lakYkVrZIpEibM6kkXx6NCq_KfNVBh6lwzYqhB-00cwDee8LSo3Hv9txqv-P1IySKAdQ4E9YxCnMN3HLvVnY9IqaXafjH74eOiX-iVhFo4p3Gk-RJHy_otUPUizAbhqH6ylW25-8VoeUe2DH1XnnJVLc5g3g0FFgxTpqDO80RVQUOCpmtwFt5UjusWubjk1yhd5pLSbenMTGahEEtJ7xRcdx9owceM_2-WTBmC">
            </div>
            <span class="font-arcade text-4xl font-extrabold text-neon-cyan tracking-tighter neon-glow">ALTAIR</span>
        </div>
        <nav class="hidden md:flex items-center gap-8">
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="/home.html">HOME</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="#">RADAR</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="/sky.html">SKY VIEW</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-gray-400 hover:text-neon-cyan transition-colors" href="/game.html">GAMES</a>
            <a class="font-label-caps text-[12px] tracking-[0.15em] font-bold text-neon-cyan border-b-2 border-neon-cyan pb-1 transition-all duration-300" href="/knowledge.html">KNOWLEDGE HUB</a>
        </nav>
        <div class="flex items-center gap-6">
            <button class="material-symbols-outlined text-gray-400 hover:text-neon-cyan transition-all active:scale-95">notifications</button>
            <a href="/profile.html" class="flex items-center gap-3 bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant/30 hover:bg-surface-variant transition-colors cursor-pointer">
                <span id="user-profile-name" class="font-label-caps font-bold tracking-[0.15em] text-[10px] text-neon-cyan"></span>
                <button class="material-symbols-outlined text-neon-cyan" style="font-variation-settings: 'FILL' 1;">account_circle</button>
            </a>
            <button id="logout-btn" class="font-label-caps font-bold tracking-[0.15em] text-[10px] text-hazard-orange hover:text-white transition-colors border border-hazard-orange/30 px-3 py-1 rounded">LOGOUT</button>
        </div>
    </header>

    <main class="flex-1 mt-20 flex flex-col items-center justify-center p-8 relative">
        <div class="absolute inset-0 pointer-events-none" style="background-image: radial-gradient(white 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1;"></div>
        
        <h1 class="font-display text-4xl md:text-5xl tracking-[0.3em] mb-16 text-white text-center z-10">KNOWLEDGE <span class="text-[var(--primary)]">HUB</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 w-full max-w-6xl z-10">
            <!-- Solar System -->
            <a href="/solar-system.html" class="group relative overflow-hidden rounded-xl border border-[var(--primary)]/30 hover:border-[var(--primary)] bg-black/50 p-8 transition-all duration-500 hover:shadow-[0_0_30px_rgba(0,245,255,0.4)] flex flex-col items-center justify-center min-h-[300px]">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80 z-0"></div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" class="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-50 transition-opacity duration-500 group-hover:scale-110">
                <div class="relative z-10 flex flex-col items-center">
                    <span class="material-symbols-outlined text-[var(--primary)] text-6xl mb-4 group-hover:animate-bounce">public</span>
                    <h2 class="font-display text-2xl tracking-widest text-center text-white">SOLAR SYSTEM</h2>
                    <p class="font-arcade text-gray-400 mt-4 text-center tracking-widest">ARCHIVES OF OUR LOCAL WORLDS</p>
                </div>
            </a>
            
            <!-- Exoplanets -->
            <a href="/exoplanets.html" class="group relative overflow-hidden rounded-xl border border-[var(--secondary)]/30 hover:border-[var(--secondary)] bg-black/50 p-8 transition-all duration-500 hover:shadow-[0_0_30px_rgba(157,0,255,0.4)] flex flex-col items-center justify-center min-h-[300px]">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80 z-0"></div>
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRwF31D05uBqsqJyGXeXJLuMia3xF0pZkg7yNtDGNNH8yFLzAIxSYbQfywA6GbEe1iC-HGopURf1tqTbn41rpzTD27scdtwe5RLgU2KHtYAM5jmfOzatSYSwWTHyP7P9f_7mSU1-CDoH1JEmfE0GFkhoXP-oC621xsnPKmRxfK7URNOLKzW7ETE6zodwWdZcKE_mzztV3qlaGvcEW5YfLLvZs7AOnt8QeCmB_mU8njd2gqg6l9tSKFdt6cKwiGPcq_FtrAAwY7lQU2" class="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-50 transition-opacity duration-500 group-hover:scale-110">
                <div class="relative z-10 flex flex-col items-center">
                    <span class="material-symbols-outlined text-[var(--secondary)] text-6xl mb-4 group-hover:animate-pulse">rocket_launch</span>
                    <h2 class="font-display text-2xl tracking-widest text-center text-white">OTHER PLANETS</h2>
                    <p class="font-arcade text-gray-400 mt-4 text-center tracking-widest">EXOPLANETS & DISTANT WORLDS</p>
                </div>
            </a>
            
            <!-- Black Holes -->
            <a href="/blackholes.html" class="group relative overflow-hidden rounded-xl border border-[#ff0055]/30 hover:border-[#ff0055] bg-black/50 p-8 transition-all duration-500 hover:shadow-[0_0_30px_rgba(255,0,85,0.4)] flex flex-col items-center justify-center min-h-[300px]">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80 z-0"></div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Black_hole_-_Messier_87_crop_max_res.jpg" class="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-50 transition-opacity duration-500 group-hover:scale-110" style="filter: hue-rotate(-30deg);">
                <div class="relative z-10 flex flex-col items-center">
                    <span class="material-symbols-outlined text-[#ff0055] text-6xl mb-4 group-hover:rotate-180 transition-transform duration-1000">all_out</span>
                    <h2 class="font-display text-2xl tracking-widest text-center text-white">BLACK HOLES</h2>
                    <p class="font-arcade text-gray-400 mt-4 text-center tracking-widest">COSMIC ANOMALIES</p>
                </div>
            </a>
        </div>
    </main>

    <script>
        // Auth Logic
        const username = localStorage.getItem('altair_username');
        if (username) {
            const profileName = document.getElementById('user-profile-name');
            if (profileName) {
                profileName.textContent = username.toUpperCase();
            }
        }
        
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('altair_token');
                localStorage.removeItem('altair_username');
                window.location.href = '/landing.html';
            });
        }
    </script>
</body>
</html>
