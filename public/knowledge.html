<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTAIR - Knowledge Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #9d00ff;
            --accent: #ff0055;
            --hazard: #ff3300;
            --bg-dark: #050505;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Starry background */
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        .font-display { font-family: 'Syncopate', sans-serif; }
        .font-arcade { font-family: 'VT323', monospace; }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(0,245,255,0.7), 0 0 20px rgba(0,245,255,0.5);
        }

        /* Planet UI Styles */
        .hud-line {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .planet-sphere {
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            /* Extremely realistic lighting shadow from left to right */
            box-shadow: 
                inset 500px 0 300px -50px rgba(0,0,0,1), 
                inset 200px 0 150px rgba(0,0,0,0.8),
                inset -20px 0 50px rgba(255,255,255,0.1);
            position: relative;
        }

        /* Central Crosshair */
        .crosshair-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .crosshair-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .crosshair-circle::before, .crosshair-circle::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.3);
        }
        
        .crosshair-circle::before {
            top: -10px; bottom: -10px; left: 50%; width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.3) 90%, transparent);
        }

        .crosshair-circle::after {
            left: -10px; right: -10px; top: 50%; height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.3) 90%, transparent);
        }

        /* Small precise ticks on crosshair */
        .tick {
            position: absolute;
            background: rgba(255,255,255,0.6);
        }
        .tick.top { top: 0; left: 50%; width: 2px; height: 6px; transform: translateX(-50%); }
        .tick.bottom { bottom: 0; left: 50%; width: 2px; height: 6px; transform: translateX(-50%); }
        .tick.left { left: 0; top: 50%; width: 6px; height: 2px; transform: translateY(-50%); }
        .tick.right { right: 0; top: 50%; width: 6px; height: 2px; transform: translateY(-50%); }
        
        /* 45 degree ticks */
        .tick.d1 { top: 14.6%; left: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, -50%); }
        .tick.d2 { top: 14.6%; right: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(50%, -50%); }
        .tick.d3 { bottom: 14.6%; left: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, 50%); }
        .tick.d4 { bottom: 14.6%; right: 14.6%; width: 4px; height: 4px; border-radius: 50%; transform: translate(50%, 50%); }

        .crosshair-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: white;
            z-index: 10;
        }

        .data-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.05em;
        }
        
        .composition-box {
            position: absolute;
            font-size: 8px;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
        }
        
        .composition-line {
            position: absolute;
            height: 1px;
            background: rgba(255,255,255,0.4);
            transform-origin: left center;
        }

        .dot {
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

        </div>
        <nav class="hidden md:flex items-center gap-8">
            <a class="font-arcade text-lg text-zinc-400 hover:text-[#00f5ff] transition-colors uppercase tracking-widest" href="/home.html">HOME</a>
            <a class="font-arcade text-lg text-zinc-400 hover:text-[#00f5ff] transition-colors uppercase tracking-widest" href="#">RADAR</a>
            <a class="font-arcade text-lg text-zinc-400 hover:text-[#00f5ff] transition-colors uppercase tracking-widest" href="/sky.html">SKY VIEW</a>
            <a class="font-arcade text-lg text-zinc-400 hover:text-[#00f5ff] transition-colors uppercase tracking-widest" href="/game.html">GAMES</a>
            <a class="font-arcade text-lg text-[#00f5ff] border-b-2 border-[#00f5ff] pb-1 transition-all duration-300 uppercase tracking-widest neon-text" href="/knowledge.html">KNOWLEDGE HUB</a>
        </nav>
        <div class="flex items-center gap-6">

            <div id="user-profile" class="hidden items-center gap-3 bg-white/5 px-3 py-1 rounded-full border border-white/20">

            </div>

                <button id="nav-signup-btn" class="font-arcade text-[10px] bg-[#00f5ff]/10 border border-[#00f5ff] text-[#00f5ff] px-3 py-1 rounded hover:bg-[#00f5ff] hover:text-black transition-all">SIGN UP</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 mt-20 relative flex overflow-hidden">
        
        <!-- State 1: Solar System Overview -->
        <div id="overview-state" class="w-full h-[calc(100vh-80px)] flex flex-col items-center justify-center relative z-10 transition-opacity duration-500">
            <h1 class="font-display text-4xl tracking-[0.3em] mb-16 text-white text-center">SOLAR SYSTEM <br><span class="text-primary text-xl">ARCHIVES</span></h1>
            
            <div class="flex flex-wrap justify-center gap-8 max-w-5xl px-8" id="planet-grid">
                <!-- Planet Thumbnails Injected via JS -->
            </div>
        </div>

        <!-- State 2: Planet Detail HUD -->
        <div id="detail-state" class="absolute inset-0 w-full h-[calc(100vh-80px)] hidden opacity-0 transition-opacity duration-1000 bg-black z-20">
            
            <button onclick="showOverview()" class="absolute top-8 left-8 flex items-center gap-2 text-zinc-400 hover:text-white transition-colors z-50 font-mono text-xs tracking-widest uppercase">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Return to Overview
            </button>

            <!-- Planet Container (Positioned center) -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] planet-sphere" id="hud-planet">
                <!-- Crosshair -->
                <div class="crosshair-container">
                    <div class="crosshair-circle">
                        <div class="tick top"></div>
                        <div class="tick bottom"></div>
                        <div class="tick left"></div>
                        <div class="tick right"></div>
                        <div class="tick d1 bg-white/30"></div>
                        <div class="tick d2 bg-white/30"></div>
                        <div class="tick d3 bg-white/30"></div>
                        <div class="tick d4 bg-white/30"></div>
                    </div>
                    <div class="crosshair-text" id="hud-title">EARTH</div>
                </div>

                <!-- Composition Lines & Callouts -->
                <div id="hud-composition" class="absolute inset-0 pointer-events-none"></div>
            </div>

            <!-- HUD Data Bottom Layer -->
            <div class="absolute bottom-16 left-16 flex flex-col gap-2">
                <div class="absolute -top-4 -left-4 w-12 h-12 border-t border-l border-white/10 opacity-50"></div>
                <div class="absolute -bottom-4 -left-4 w-12 h-12 border-b border-l border-white/10 opacity-50"></div>
                <div class="flex gap-4 items-baseline justify-between w-48">
                    <span class="data-label">ORBIT DISTANCE:</span>
                    <span class="data-value" id="hud-orbit-dist"></span>
                </div>
                <div class="flex gap-4 items-baseline justify-between w-48">
                    <span class="data-label">AXIAL TILT:</span>
                    <span class="data-value" id="hud-axial-tilt"></span>
                </div>
            </div>

            <div class="absolute bottom-16 left-1/2 -translate-x-1/2 flex flex-col gap-2 items-center">
                <div class="flex gap-4 items-baseline justify-between w-48">
                    <span class="data-label">ORBITAL PERIOD:</span>
                    <span class="data-value" id="hud-orbital-period"></span>
                </div>
                <div class="flex gap-4 items-baseline justify-between w-48">
                    <span class="data-label">LENGHT OF DAY:</span>
                    <span class="data-value" id="hud-length-day"></span>
                </div>
            </div>

            <div class="absolute bottom-16 right-16 flex flex-col gap-2 items-end">
                <div class="absolute -top-4 -right-4 w-12 h-12 border-t border-r border-white/10 opacity-50"></div>
                <div class="absolute -bottom-4 -right-4 w-12 h-12 border-b border-r border-white/10 opacity-50"></div>
                <div class="flex gap-4 items-baseline justify-between w-64">
                    <span class="data-label">DIAMETR:</span>
                    <span class="data-value" id="hud-diameter"></span>
                </div>
                <div class="flex gap-4 items-baseline justify-between w-64">
                    <span class="data-label">MASS:</span>
                    <span class="data-value" id="hud-mass"></span>
                </div>
                <div class="flex gap-4 items-baseline justify-between w-64">
                    <span class="data-label">SURFACE TEMPERATURE:</span>
                    <span class="data-value" id="hud-surface-temp"></span>
                </div>
            </div>

        </div>

    </main>

            },

                orbitDistance: '227 939 200 KM',
                axialTilt: '25.19°',
                orbitalPeriod: '687 DAYS',
                lengthOfDay: '24.6 HOURS',

                mass: '6.39*10^23 KG',
                surfaceTemp: '-153°C to +20°C',
                composition: [
                    { label: 'CO2', value: '95.32%' },
                    { label: 'N2', value: '2.7%' },

                ]
            },

                axialTilt: '3.13°',
                orbitalPeriod: '4333 DAYS',
                lengthOfDay: '9.93 HOURS',

                mass: '1.898*10^27 KG',

            {

                ]
            },
            {
                id: 'neptune',
                name: 'NEPTUNE',
                image: 'https://upload.wikimedia.org/wikipedia/commons/6/63/Neptune_-_Voyager_2_%2829741875326%29.png',
                orbitDistance: '4 495 000 000 KM',
                axialTilt: '28.32°',
                orbitalPeriod: '60182 DAYS',
                lengthOfDay: '16.1 HOURS',
                diameter: '49 244 KM',
                mass: '1.024*10^26 KG',

                    { label: 'H2', value: '80%' },
                    { label: 'He', value: '19%' },
                    { label: 'CH4', value: '1.5%' }
                ]
            }
        ];

        const overviewState = document.getElementById('overview-state');
        const detailState = document.getElementById('detail-state');
        const planetGrid = document.getElementById('planet-grid');

        // Populate Overview Grid
        planets.forEach(p => {
            const card = document.createElement('div');
            card.className = 'flex flex-col items-center gap-4 cursor-pointer group';
            card.onclick = () => showDetail(p.id);
            
            card.innerHTML = `
                <div class="w-32 h-32 rounded-full overflow-hidden border border-white/10 group-hover:border-primary transition-colors shadow-[0_0_15px_rgba(0,0,0,0.5)]">
                    <div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style="background-image: url('${p.image}')"></div>
                </div>
                <span class="font-arcade text-xl tracking-widest text-zinc-400 group-hover:text-white transition-colors">${p.name}</span>
            `;
            planetGrid.appendChild(card);
        });

        function showDetail(planetId) {
            const data = planets.find(p => p.id === planetId);
            if (!data) return;

            // Populate HUD
            document.getElementById('hud-title').textContent = data.name;
            document.getElementById('hud-planet').style.backgroundImage = `url('${data.image}')`;
            
            document.getElementById('hud-orbit-dist').textContent = data.orbitDistance;
            document.getElementById('hud-axial-tilt').textContent = data.axialTilt;
            document.getElementById('hud-orbital-period').textContent = data.orbitalPeriod;
            document.getElementById('hud-length-day').textContent = data.lengthOfDay;
            document.getElementById('hud-diameter').textContent = data.diameter;
            document.getElementById('hud-mass').textContent = data.mass;
            document.getElementById('hud-surface-temp').textContent = data.surfaceTemp;

            // Build composition callouts
            const compContainer = document.getElementById('hud-composition');
            compContainer.innerHTML = '';
            
            if(data.composition && data.composition.length > 0) {
                // To match screenshots, line goes right
                const compHtml = `
                    <div class="composition-line" style="top: 25%; left: 85%; width: 60px;"></div>
                    <div class="dot" style="top: 25%; left: 85%; transform: translate(-50%, -50%);"></div>
                    <div class="dot" style="top: 25%; left: calc(85% + 60px); transform: translate(-50%, -50%);"></div>
                    <div class="composition-box" style="top: 25%; left: calc(85% + 70px); transform: translateY(-30%);">
                        ${data.composition.map(c => {
                            if (c.isTitle) return `<div class="mt-2 mb-1 text-white opacity-90">${c.label}</div>`;
                            return `<div>${c.label} = ${c.value}</div>`;
                        }).join('')}
                    </div>
                `;
                compContainer.innerHTML = compHtml;
            }

            // Transition
            overviewState.classList.add('opacity-0');
            setTimeout(() => {
                overviewState.classList.add('hidden');
                detailState.classList.remove('hidden');
                // reflow
                void detailState.offsetWidth;
                detailState.classList.remove('opacity-0');
            }, 500);
        }

        function showOverview() {
            detailState.classList.add('opacity-0');
            setTimeout(() => {
                detailState.classList.add('hidden');
                overviewState.classList.remove('hidden');
                // reflow
                void overviewState.offsetWidth;
                overviewState.classList.remove('opacity-0');
            }, 500);
        }

        // Basic Auth script from other pages
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('altair_token');
            if (token) {
                fetch('http://localhost:8000/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(r => r.json()).then(data => {
                    if (data.username) {
                        document.getElementById('auth-buttons').classList.add('hidden');
                        document.getElementById('user-profile').classList.remove('hidden');
                        document.getElementById('user-profile').classList.add('flex');
                        document.getElementById('nav-username').textContent = data.username;
                    }
                });
            }
            
            document.getElementById('nav-logout-btn')?.addEventListener('click', () => {
                localStorage.removeItem('altair_token');
                window.location.reload();
            });
        });

    </script>
</body>
</html>
